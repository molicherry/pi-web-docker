name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (dry run — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            PI_WEB_VERSION=main
          cache-from: type=gha
          cache-to: type=gha,mode=max
